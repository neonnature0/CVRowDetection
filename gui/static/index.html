<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVRowDetection</title>

  <!-- Alpine.js (no build step) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- MapLibre GL JS -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- MapLibre Draw (for polygon drawing) -->
  <link rel="stylesheet" href="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.css">
  <script src="https://unpkg.com/@mapbox/mapbox-gl-draw@1.4.3/dist/mapbox-gl-draw.js"></script>

  <!-- App -->
  <link rel="stylesheet" href="/css/main.css">
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/map-view.js"></script>
  <script src="/js/lightbox.js"></script>
  <script src="/js/library-view.js"></script>
  <script src="/js/annotate-view.js"></script>
  <script src="/js/train-view.js"></script>
  <script src="/js/verify-view.js"></script>
</head>

<body x-data x-init="$store.app.init()">

  <!-- Navigation -->
  <nav>
    <span class="brand">CVRowDetection</span>
    <a href="#map"      :class="{ active: $store.app.view === 'map' }">Add Blocks</a>
    <a href="#annotate" :class="{ active: $store.app.view === 'annotate' }">Annotate</a>
    <a href="#library"  :class="{ active: $store.app.view === 'library' }">Library</a>
    <a href="#train"    :class="{ active: $store.app.view === 'train' }">Train</a>
    <a href="#verify"   :class="{ active: $store.app.view === 'verify' }">Verify</a>
  </nav>

  <!-- Main content area -->
  <main>

    <!-- Map View (Add Blocks) — use x-show to keep DOM alive for MapLibre -->
    <div class="view-map" x-show="$store.app.view === 'map'">
      <div id="map-container"></div>
      <div class="map-sidebar">
        <h3>Blocks</h3>
        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">
          Draw a polygon on the map, then click <b>Save Block</b>.
        </div>
        <button class="btn btn-primary" style="width: 100%;" id="save-block-btn" disabled>
          Save Block
        </button>
        <div id="sidebar-block-list" style="display: flex; flex-direction: column; gap: 4px; margin-top: 8px;">
        </div>
      </div>
    </div>

    <!-- Annotate View -->
    <div x-show="$store.app.view === 'annotate'" class="annotate-container" x-data="annotateView">

      <!-- Empty queue -->
      <template x-if="queue.length === 0">
        <div class="placeholder-view">
          No blocks ready for annotation. Detect some blocks first (Library &rarr; Detect).
        </div>
      </template>

      <!-- Has items in queue -->
      <template x-if="queue.length > 0">
        <div style="display: flex; flex-direction: column; height: 100%;">
          <!-- Header bar -->
          <div class="annotate-toolbar">
            <span style="font-weight: 600;">Annotate</span>
            <span class="name" x-text="current ? current.name : ''"></span>
            <span style="color: var(--text-muted); font-size: 12px;" x-text="progress"></span>
          </div>

          <!-- Content area -->
          <div style="flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; position: relative;">

            <!-- Idle: click to start -->
            <template x-if="state === 'idle'">
              <div style="text-align: center;">
                <p style="color: var(--text-muted); margin-bottom: 16px;">
                  Block <b x-text="current ? current.name : ''"></b> — ready to detect
                </p>
                <button class="btn btn-primary" @click="prepareAndDetect()">
                  Run Detection
                </button>
                <button class="btn btn-secondary" style="margin-left: 8px;" @click="skip()">
                  Skip
                </button>
              </div>
            </template>

            <!-- Loading: detection in progress -->
            <template x-if="state === 'loading'">
              <div style="text-align: center;">
                <div class="spinner"></div>
                <p style="color: var(--text-muted); margin-top: 12px;">
                  Fetching tiles &amp; detecting rows...
                </p>
                <button class="btn btn-secondary" style="margin-top: 12px;" @click="cancelDetection()">
                  Cancel
                </button>
              </div>
            </template>

            <!-- Ready: show overlay, choose action -->
            <template x-if="state === 'ready'">
              <div style="text-align: center; max-height: 100%; overflow: auto;">
                <img :src="overlayUrl()" alt="detection overlay"
                     style="max-width: 100%; max-height: calc(100vh - 160px); border-radius: 4px;">
                <div style="margin-top: 12px; display: flex; gap: 8px; justify-content: center;">
                  <button class="btn btn-success" @click="accept()">Accept</button>
                  <button class="btn btn-primary" @click="launchEditor()">Edit</button>
                  <button class="btn btn-secondary" @click="skip()">Skip</button>
                </div>
              </div>
            </template>

            <!-- Editing: matplotlib open -->
            <template x-if="state === 'editing'">
              <div style="text-align: center;">
                <p style="color: var(--accent); font-size: 16px;">Annotation editor open</p>
                <p style="color: var(--text-muted); margin-top: 8px;">
                  Edit rows in the matplotlib window, then save (S) and close it.
                </p>
                <div class="spinner" style="margin-top: 16px;"></div>
              </div>
            </template>

            <!-- Error -->
            <template x-if="state === 'error'">
              <div style="text-align: center;">
                <p style="color: var(--danger);" x-text="errorMsg"></p>
                <button class="btn btn-secondary" style="margin-top: 12px;" @click="retry()">
                  Retry
                </button>
                <button class="btn btn-secondary" style="margin-left: 8px;" @click="skip()">
                  Skip
                </button>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>

    <!-- Library View -->
    <div x-show="$store.app.view === 'library'" class="library-container" x-data="libraryView">
      <!-- Filter bar -->
      <div class="library-toolbar">
        <span style="font-size: 13px; color: var(--text-muted);">Filter:</span>
        <template x-for="s in ['all','draft','detected','annotated','verified']">
          <button class="btn btn-secondary btn-sm" :class="{ 'btn-active': filter === s }"
                  @click="filter = s" x-text="s"></button>
        </template>
        <span style="margin-left: auto; font-size: 12px; color: var(--text-muted);"
              x-text="filteredBlocks.length + ' blocks'"></span>
      </div>

      <!-- Block grid -->
      <div class="library-grid">
        <template x-for="block in filteredBlocks" :key="block.name">
          <div class="library-card">
            <!-- Thumbnail — click to open full overlay in lightbox -->
            <div class="card-thumb" @click="hasDetection(block) && $store.lightbox.open(overlayUrl(block.name))">
              <template x-if="hasDetection(block)">
                <img :src="thumbnailUrl(block.name)" alt="thumbnail" loading="lazy">
              </template>
              <template x-if="!hasDetection(block)">
                <div class="card-thumb-empty">No detection</div>
              </template>
            </div>

            <!-- Info -->
            <div class="card-info">
              <span class="name" x-text="block.name"></span>
              <span class="stage" :class="'stage-' + (block.stage || 'draft')"
                    x-text="block.stage || 'draft'"></span>
            </div>

            <!-- Actions -->
            <div class="card-actions">
              <button class="btn btn-primary btn-sm"
                      @click="runDetection(block.name)"
                      :disabled="detecting === block.name"
                      x-text="detecting === block.name ? 'Detecting...' : 'Detect'"></button>
              <button class="btn btn-secondary btn-sm"
                      @click="launchAnnotate(block.name)"
                      :disabled="editorBlock === block.name">Annotate</button>
              <button class="btn btn-danger btn-sm" @click="deleteBlock(block.name)">Del</button>
            </div>

          </div>
        </template>
      </div>
    </div>

    <!-- Train View -->
    <div x-show="$store.app.view === 'train'" class="train-container" x-data="trainView">
      <div class="train-panel">
        <h2>ML Training</h2>

        <!-- Stats -->
        <div class="train-stats" x-show="stats">
          <div class="stat-item">
            <span class="stat-value" x-text="stats ? stats.annotated_blocks : 0"></span>
            <span class="stat-label">Annotated blocks</span>
          </div>
          <div class="stat-item">
            <span class="stat-value" x-text="stats && stats.model ? stats.model.size_mb + ' MB' : 'None'"></span>
            <span class="stat-label">Current model</span>
          </div>
        </div>

        <!-- Idle -->
        <template x-if="state === 'idle'">
          <div class="train-actions">
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 12px;">
              Step 1: Generate training patches from completed annotations.<br>
              Step 2: Train the U-Net model.
            </p>
            <button class="btn btn-primary" @click="generate()" style="width: 100%; margin-bottom: 8px;">
              Generate Training Data
            </button>
            <button class="btn btn-success" @click="startTraining()" style="width: 100%;"
                    :disabled="!stats || stats.annotated_blocks === 0">
              Start Training
            </button>
          </div>
        </template>

        <!-- Generating -->
        <template x-if="state === 'generating'">
          <div style="text-align: center; padding: 24px 0;">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); margin-top: 12px;">Generating training patches...</p>
          </div>
        </template>

        <!-- Training in progress -->
        <template x-if="state === 'training'">
          <div>
            <div class="progress-bar-container">
              <div class="progress-bar" :style="'width:' + progressPct + '%'"></div>
            </div>
            <div class="train-metrics" x-show="progress">
              <div class="metric">
                <span class="metric-label">Epoch</span>
                <span x-text="progress ? progress.epoch + ' / ' + progress.total_epochs : ''"></span>
              </div>
              <div class="metric">
                <span class="metric-label">Train Loss</span>
                <span x-text="progress ? progress.train_loss : ''"></span>
              </div>
              <div class="metric">
                <span class="metric-label">Val Dice</span>
                <span x-text="progress ? progress.val_dice : ''"></span>
              </div>
              <div class="metric">
                <span class="metric-label">Best Dice</span>
                <span style="color: var(--success);" x-text="progress ? progress.best_dice : ''"></span>
              </div>
            </div>
            <button class="btn btn-danger" style="width: 100%; margin-top: 12px;" @click="stopTraining()">
              Stop Training
            </button>
          </div>
        </template>

        <!-- Complete -->
        <template x-if="state === 'complete'">
          <div style="text-align: center;">
            <p style="color: var(--success); font-size: 16px; margin-bottom: 8px;">Training Complete</p>
            <div class="train-metrics" x-show="progress">
              <div class="metric">
                <span class="metric-label">Final Best Dice</span>
                <span style="color: var(--success); font-weight: 600;" x-text="progress ? progress.best_dice : ''"></span>
              </div>
              <div class="metric">
                <span class="metric-label">Epochs</span>
                <span x-text="progress ? progress.epoch : ''"></span>
              </div>
            </div>
            <button class="btn btn-warning" style="width: 100%; margin-top: 16px;" @click="invalidateAll()">
              Clear All Detections (Re-detect with new model)
            </button>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 8px;" @click="reset()">
              Back
            </button>
          </div>
        </template>

        <!-- Error -->
        <template x-if="state === 'error'">
          <div style="text-align: center;">
            <p style="color: var(--danger);" x-text="errorMsg"></p>
            <button class="btn btn-secondary" style="margin-top: 12px;" @click="reset()">Back</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Verify View -->
    <div x-show="$store.app.view === 'verify'" class="verify-container" x-data="verifyView">
      <div class="verify-toolbar">
        <span style="font-weight: 600;">Visual Verification</span>
        <label style="font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px;">
          Blocks:
          <input type="number" x-model.number="n" min="1" max="100"
                 style="width: 50px; padding: 4px; background: var(--bg-card); color: var(--text);
                        border: 1px solid var(--border); border-radius: 4px; font-size: 12px;">
        </label>
        <button class="btn btn-primary btn-sm" @click="startVerify()"
                :disabled="state === 'running'">
          <span x-text="state === 'running' ? 'Running...' : 'Run Verify'"></span>
        </button>
        <template x-if="state === 'running'">
          <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
            <div class="progress-bar-container" style="flex: 1; height: 8px;">
              <div class="progress-bar" :style="'width:' + progressPct + '%'"></div>
            </div>
            <span style="font-size: 11px; color: var(--text-muted);"
                  x-text="progress.done + '/' + progress.total"></span>
          </div>
        </template>
      </div>

      <!-- Results grid -->
      <div class="verify-grid" x-show="results.length > 0">
        <template x-for="r in results" :key="r.name">
          <div class="verify-card">
            <div class="card-thumb" @click="r.overlay_url && $store.lightbox.open(r.overlay_url)">
              <template x-if="r.overlay_url">
                <img :src="r.overlay_url" alt="overlay" loading="lazy">
              </template>
              <template x-if="!r.overlay_url">
                <div class="card-thumb-empty" x-text="r.error || 'Failed'"></div>
              </template>
            </div>
            <div class="verify-info">
              <span class="name" x-text="r.name"></span>
              <span style="font-size: 11px; color: var(--text-muted);"
                    x-text="r.row_count + ' rows'"></span>
              <span style="font-size: 11px; color: var(--text-muted);"
                    x-text="r.spacing_m + 'm'"></span>
              <span style="font-size: 11px;"
                    :style="'color:' + (r.confidence >= 0.7 ? 'var(--success)' : r.confidence >= 0.4 ? 'var(--warning)' : 'var(--danger)')"
                    x-text="Math.round(r.confidence * 100) + '%'"></span>
            </div>
          </div>
        </template>
      </div>

      <!-- Empty state -->
      <div x-show="state === 'idle' && results.length === 0" class="placeholder-view">
        Click "Run Verify" to check detection quality on random blocks.
      </div>
    </div>

  </main>

  <!-- Lightbox overlay (zoom/pan image viewer) -->
  <div class="lightbox-overlay" x-show="$store.lightbox.visible" x-cloak>
    <div class="lightbox-toolbar">
      <button class="btn btn-secondary btn-sm" @click="$store.lightbox.zoom(300)">+</button>
      <button class="btn btn-secondary btn-sm" @click="$store.lightbox.zoom(-300)">&minus;</button>
      <button class="btn btn-secondary btn-sm" @click="$store.lightbox.resetView()">Fit</button>
      <span style="color: var(--text-muted); font-size: 11px; margin-left: 8px;"
            x-text="Math.round($store.lightbox.scale * 100) + '%'"></span>
      <button class="btn btn-danger btn-sm" style="margin-left: auto;" @click="$store.lightbox.close()">
        Close (Esc)
      </button>
    </div>
    <div class="lightbox-canvas"
         @wheel.prevent="lightboxWheel(event)"
         @mousedown="lightboxMouseDown(event)"
         @mousemove="lightboxMouseMove(event)"
         @mouseup="lightboxMouseUp(event)"
         @mouseleave="lightboxMouseUp(event)">
      <div class="lightbox-content"
           :style="'transform: translate(' + $store.lightbox.panX + 'px,' + $store.lightbox.panY + 'px) scale(' + $store.lightbox.scale + ')'">
        <img :src="$store.lightbox.src" alt="Full-size image" draggable="false"
             @load="$store.lightbox.fitToScreen($event.target)">
      </div>
    </div>
  </div>

</body>
</html>
